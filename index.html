<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>地獄卡牌 Hell Cards</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; color: #eee; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; padding: 2rem; }
  h1 { text-align: center; margin-bottom: 0.5rem; font-size: 2rem; }
  .subtitle { text-align: center; color: #888; margin-bottom: 1.5rem; font-size: 0.9rem; }
  .tabs { display: flex; justify-content: center; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .tab { padding: 0.6rem 1.4rem; border-radius: 8px; border: 2px solid #e94560; background: transparent; color: #e94560; cursor: pointer; font-size: 0.95rem; font-weight: 600; transition: all 0.2s; }
  .tab:hover { background: rgba(233,69,96,0.15); }
  .tab.active { background: #e94560; color: #fff; }
  .api-info { text-align: center; padding: 1rem; background: #16213e; border-radius: 8px; max-width: 700px; margin: 0 auto 1.5rem; }
  .api-info code { background: #0f3460; padding: 2px 8px; border-radius: 4px; font-size: 0.85rem; }
  a { color: #e94560; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1rem; max-width: 1400px; margin: 0 auto; }
  .card { background: #16213e; border-radius: 12px; overflow: hidden; transition: transform 0.2s; cursor: pointer; }
  .card:hover { transform: translateY(-4px); }
  .card img { width: 100%; display: block; }
  .card .info { padding: 0.5rem 0.6rem; }
  .card .name { font-size: 0.85rem; color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card .id { font-family: monospace; color: #666; font-size: 0.75rem; margin-top: 0.2rem; }
  .section { display: none; }
  .section.active { display: block; }
</style>
</head>
<body>
<h1>🔥 地獄卡牌 Hell Cards</h1>
<p class="subtitle">共 150 張卡牌 — 點擊卡牌可開啟原圖 · <a href="gacha/" style="color:#FFD700;font-weight:bold;">🎴 抽卡包</a></p>

<div class="tabs">
  <button class="tab active" data-target="all">全部 (150)</button>
  <button class="tab" data-target="hell">地獄職場 (100)</button>
  <button class="tab" data-target="badboss">壞老闆語錄 (50)</button>
</div>

<div class="api-info">
  <p>📡 BOT API:
    <code><a href="cards.json">cards.json</a></code> ·
    <code><a href="badboss.json">badboss.json</a></code>
  </p>
  <p style="margin-top:0.5rem; color:#888; font-size:0.85rem;">
    地獄職場圖片: <code>https://tonywang0122.github.io/hell-cards/{id}.png</code>
  </p>
  <p style="margin-top:0.3rem; color:#888; font-size:0.85rem;">
    壞老闆圖片: <code>https://tonywang0122.github.io/hell-cards/BB-{01~50}.png</code>
  </p>
</div>

<div id="section-all" class="section active"><div class="grid" id="grid-all"></div></div>
<div id="section-hell" class="section"><div class="grid" id="grid-hell"></div></div>
<div id="section-badboss" class="section"><div class="grid" id="grid-badboss"></div></div>

<script>
function createCard(c) {
  const div = document.createElement('div');
  div.className = 'card';
  div.innerHTML = `<a href="${c.image}" target="_blank"><img src="${c.image}" alt="${c.id}" loading="lazy"></a><div class="info"><div class="name">${c.name || ''}</div><div class="id">${c.id}</div></div>`;
  return div;
}

Promise.all([
  fetch('cards.json').then(r => r.json()),
  fetch('badboss.json').then(r => r.json())
]).then(([hellData, bbData]) => {
  const gridAll = document.getElementById('grid-all');
  const gridHell = document.getElementById('grid-hell');
  const gridBB = document.getElementById('grid-badboss');

  hellData.cards.forEach(c => {
    gridAll.appendChild(createCard(c));
    gridHell.appendChild(createCard(c));
  });
  bbData.cards.forEach(c => {
    gridAll.appendChild(createCard(c));
    gridBB.appendChild(createCard(c));
  });
});

document.querySelector('.tabs').addEventListener('click', e => {
  const btn = e.target.closest('.tab');
  if (!btn) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('section-' + btn.dataset.target).classList.add('active');
});
</script>
</body>
</html>

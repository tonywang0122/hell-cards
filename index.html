<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>地獄卡牌 Hell Cards</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; color: #eee; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; padding: 2rem; }
  h1 { text-align: center; margin-bottom: 0.5rem; font-size: 2rem; }
  .subtitle { text-align: center; color: #888; margin-bottom: 2rem; font-size: 0.9rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1rem; max-width: 1400px; margin: 0 auto; }
  .card { background: #16213e; border-radius: 12px; overflow: hidden; transition: transform 0.2s; cursor: pointer; }
  .card:hover { transform: translateY(-4px); }
  .card img { width: 100%; display: block; }
  .card .id { padding: 0.5rem; text-align: center; font-family: monospace; color: #666; font-size: 0.8rem; }
  .api-info { text-align: center; margin-bottom: 2rem; padding: 1rem; background: #16213e; border-radius: 8px; max-width: 700px; margin: 0 auto 2rem; }
  .api-info code { background: #0f3460; padding: 2px 8px; border-radius: 4px; font-size: 0.85rem; }
  a { color: #e94560; }
</style>
</head>
<body>
<h1>🔥 地獄卡牌 Hell Cards</h1>
<p class="subtitle">共 100 張卡牌 — 點擊卡牌可開啟原圖</p>
<div class="api-info">
  <p>📡 BOT API: <code><a href="cards.json">cards.json</a></code></p>
  <p style="margin-top:0.5rem; color:#888; font-size:0.85rem;">
    圖片 URL 格式: <code>https://tonywang0122.github.io/hell-cards/{id}.png</code>
  </p>
  <p style="margin-top:0.5rem; color:#888; font-size:0.85rem;">
    隨機抽卡 API: <code>cards.json</code> → 隨機取一筆
  </p>
</div>
<div class="grid" id="grid"></div>
<script>
fetch('cards.json')
  .then(r => r.json())
  .then(data => {
    const grid = document.getElementById('grid');
    data.cards.forEach(c => {
      const div = document.createElement('div');
      div.className = 'card';
      div.innerHTML = `<a href="${c.image}" target="_blank"><img src="${c.image}" alt="${c.id}" loading="lazy"></a><div class="id">${c.id}</div>`;
      grid.appendChild(div);
    });
  });
</script>
</body>
</html>
